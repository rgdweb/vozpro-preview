<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVoice TTS - Teste LOCAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .status.ok { background: #064e3b; color: #4ade80; }
        .status.error { background: #450a0a; color: #f87171; }
        .status.loading { background: #1e1b4b; color: #a78bfa; }

        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px 14px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            margin-bottom: 12px;
        }
        textarea { min-height: 80px; resize: vertical; font-family: inherit; }
        input[type="file"] { margin-bottom: 12px; }
        input[type="range"] { width: 100%; margin-bottom: 8px; }
        .row { display: flex; gap: 12px; }
        .row > * { flex: 1; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: #2a2a4a;
            color: #e2e8f0;
            margin-top: 8px;
        }

        .audio-result {
            display: none;
            margin-top: 16px;
        }
        .audio-result audio {
            width: 100%;
            margin-bottom: 12px;
            border-radius: 8px;
        }
        .debug {
            background: #0a0a15;
            border: 1px solid #1a1a2a;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #64748b;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .speed-label { text-align: right; color: #8b5cf6; font-size: 13px; }
        .file-info {
            font-size: 12px;
            color: #64748b;
            padding: 4px 0;
        }
        .file-info.ok { color: #4ade80; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OmniVoice TTS - Teste LOCAL</h1>
        <p class="subtitle">Tudo roda na sua maquina. Zero tunnel para audio. Zero corrupcao.</p>

        <div id="statusCheck" class="status loading">Verificando servidores...</div>

        <!-- Audio de Referencia -->
        <div class="card">
            <h3>1. Audio de Referencia (3-10 segundos)</h3>
            <label>Selecione o audio:</label>
            <input type="file" id="refAudio" accept="audio/*" />
            <div id="refInfo" class="file-info"></div>
            <label>Texto falado no audio (transcricao exata):</label>
            <input type="text" id="refText" placeholder="Ex: Ola, esta e a minha voz de referencia." />
            <label>Instrucao (opcional):</label>
            <input type="text" id="instruct" placeholder="Ex: whisper, male, female, high pitch" />
        </div>

        <!-- Texto para Gerar -->
        <div class="card">
            <h3>2. Texto para Sintetizar</h3>
            <label>Idioma:</label>
            <select id="language">
                <option value="Auto">Auto Detectar</option>
                <option value="Portuguese">Portugues</option>
                <option value="English">English</option>
                <option value="Spanish">Espanhol</option>
            </select>
            <label>Texto:</label>
            <textarea id="textToGenerate" placeholder="Digite o texto que voce quer que seja falado...">Ola, bem-vindo ao nosso sistema de voz com inteligencia artificial.</textarea>
        </div>

        <!-- Configuracoes -->
        <div class="card">
            <h3>3. Configuracoes</h3>
            <div class="row">
                <div>
                    <label>Velocidade: <span id="speedVal">1.0</span></label>
                    <input type="range" id="speed" min="0.5" max="1.5" step="0.1" value="1.0" />
                </div>
                <div>
                    <label>Qualidade (steps): <span id="stepsVal">32</span></label>
                    <input type="range" id="steps" min="4" max="64" step="4" value="32" />
                </div>
            </div>
            <div class="row">
                <div>
                    <label>Guidance Scale: <span id="guidanceVal">2.0</span></label>
                    <input type="range" id="guidance" min="0.5" max="4" step="0.1" value="2.0" />
                </div>
                <div>
                    <label>Endpoint:</label>
                    <select id="endpoint">
                        <option value="http://localhost:8080">PHP Local (localhost:8080)</option>
                        <option value="">Tunnel (auto)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Gerar -->
        <button id="btnGenerate" class="btn btn-primary" disabled>Gerar Voz</button>

        <!-- Resultado -->
        <div class="audio-result" id="audioResult">
            <div class="card">
                <h3>Resultado</h3>
                <audio id="audioPlayer" controls></audio>
                <a id="downloadLink" class="btn btn-secondary" download="omnivoice_saida.wav">Baixar Audio</a>
                <div id="debugInfo" class="debug"></div>
            </div>
        </div>
    </div>

    <script>
        // ===================== CONFIG =====================
        const PHP_LOCAL = 'http://localhost:8080';
        const API_KEY = 'vozpro_2024_a8f7d9e2b4c1m6n3p5q0r9s2t8u1';

        // ===================== ELEMENTOS =====================
        const $ = id => document.getElementById(id);
        const statusEl = $('statusCheck');
        const btnGenerate = $('btnGenerate');
        const audioResult = $('audioResult');
        const audioPlayer = $('audioPlayer');
        const downloadLink = $('downloadLink');
        const debugInfo = $('debugInfo');

        let selectedFile = null;
        let phpUrl = PHP_LOCAL;

        // ===================== SLIDERS =====================
        $('speed').oninput = e => $('speedVal').textContent = e.target.value;
        $('steps').oninput = e => $('stepsVal').textContent = e.target.value;
        $('guidance').oninput = e => $('guidanceVal').textContent = e.target.value;

        // ===================== ENDPOINT =====================
        $('endpoint').onchange = e => {
            phpUrl = e.target.value || PHP_LOCAL;
        };

        // ===================== FILE INPUT =====================
        $('refAudio').onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            selectedFile = file;
            $('refInfo').className = 'file-info ok';
            $('refInfo').textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;

            // Atualiza refText se vazio
            if (!$('refText').value) {
                $('refText').value = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');
            }
        };

        // ===================== VERIFICAR SERVIDORES =====================
        async function checkServers() {
            const results = [];

            // Check PHP
            try {
                const r = await fetch(PHP_LOCAL + '/generate.php', { method: 'OPTIONS' });
                results.push((r.ok || r.status === 200) ? 'PHP OK' : 'PHP ERRO ' + r.status);
            } catch (e) {
                results.push('PHP NAO ENCONTRADO (instale XAMPP e rode iniciar_local.bat)');
            }

            // Check OmniVoice
            try {
                const r = await fetch('http://localhost:7860/', { method: 'GET' });
                results.push((r.ok || r.status === 200) ? 'GPU OK' : 'GPU ERRO ' + r.status);
            } catch (e) {
                results.push('GPU NAO ENCONTRADO (rode omnivoice-demo --port 7860)');
            }

            const allOk = results.every(r => r.includes('OK'));
            statusEl.className = 'status ' + (allOk ? 'ok' : 'error');
            statusEl.textContent = results.join(' | ');
            btnGenerate.disabled = !allOk || !selectedFile;
        }

        checkServers();
        setInterval(checkServers, 30000);

        // ===================== GERAR HMAC TOKEN =====================
        function generateToken() {
            const timestamp = Math.floor(Date.now() / 1000);
            const hmac = await_hash_hmac(timestamp.toString(), API_KEY);
            return timestamp + '.' + hmac;
        }

        // HMAC SHA256 simples (browser)
        async function await_hash_hmac(message, key) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode(key);
            const msgData = encoder.encode(message);
            const cryptoKey = await crypto.subtle.importKey(
                'raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
            );
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, msgData);
            return Array.from(new Uint8Array(signature)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ===================== GERAR VOZ =====================
        btnGenerate.onclick = async () => {
            if (!selectedFile) {
                alert('Selecione um audio de referencia!');
                return;
            }

            const text = $('textToGenerate').value.trim();
            if (!text) {
                alert('Digite o texto para sintetizar!');
                return;
            }

            btnGenerate.disabled = true;
            btnGenerate.innerHTML = '<span class="spinner"></span>Gerando voz... (pode demorar 30-120s)';
            audioResult.style.display = 'none';
            debugInfo.textContent = 'Iniciando geracao LOCAL...\n';

            const startTime = Date.now();

            try {
                // PASSO 1: Upload do audio de referencia para o PHP local
                debugInfo.textContent += `[${new Date().toLocaleTimeString()}] Upload do audio de referencia...\n`;

                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('category', 'ref');

                const uploadResp = await fetch(phpUrl + '/upload.php', {
                    method: 'POST',
                    headers: { 'X-API-Key': API_KEY },
                    body: formData
                });

                const uploadData = await uploadResp.json();
                if (!uploadData.ok) {
                    throw new Error('Upload falhou: ' + (uploadData.error || JSON.stringify(uploadData)));
                }

                const refAudioUrl = uploadData.url;
                debugInfo.textContent += `[${new Date().toLocaleTimeString()}] Upload OK: ${refAudioUrl}\n`;

                // PASSO 2: Gerar token HMAC
                const token = generateToken();

                // PASSO 3: Enviar para geracao
                debugInfo.textContent += `[${new Date().toLocaleTimeString()}] Enviando para GPU local...\n`;

                const generateBody = {
                    text: text,
                    language: $('language').value,
                    refAudioUrl: refAudioUrl,
                    refText: $('refText').value,
                    instruct: $('instruct').value,
                    refAudioName: selectedFile.name,
                    speed: parseFloat($('speed').value),
                    numStep: parseInt($('steps').value),
                    guidanceScale: parseFloat($('guidance').value)
                };

                const genResp = await fetch(phpUrl + '/generate.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Generate-Token': token
                    },
                    body: JSON.stringify(generateBody)
                });

                const genData = await genResp.json();
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

                if (genData.erro) {
                    throw new Error(genData.erro);
                }

                // PASSO 4: Mostrar resultado
                debugInfo.textContent += `[${new Date().toLocaleTimeString()}] SUCESSO em ${elapsed}s!\n`;
                debugInfo.textContent += `  Tempo total: ${elapsed}s\n`;

                // Debug steps
                if (genData.debug && genData.debug.steps) {
                    genData.debug.steps.forEach(step => {
                        const dur = step.duration ? `${(step.duration / 1000).toFixed(1)}s` : '';
                        debugInfo.textContent += `  [${step.time}] ${step.step}: ${step.status} ${step.detail || ''} ${dur}\n`;
                    });
                }

                debugInfo.textContent += `\n  viaLocalPhp: ${genData.viaLocalPhp || false}`;
                debugInfo.textContent += `\n  (PHP e GPU comunicam via LOCALHOST - sem tunnel!)`;

                audioPlayer.src = genData.audioUrl;
                downloadLink.href = genData.audioUrl;
                audioResult.style.display = 'block';

            } catch (error) {
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                debugInfo.textContent += `[${new Date().toLocaleTimeString()}] ERRO apos ${elapsed}s: ${error.message}\n`;
                debugInfo.textContent += '\nVerifique:\n';
                debugInfo.textContent += '1. OmniVoice esta rodando? (localhost:7860)\n';
                debugInfo.textContent += '2. Apache/XAMPP esta rodando? (localhost:8080)\n';
                debugInfo.textContent += '3. Audio de referencia tem ate 10s?\n';
                debugInfo.textContent += '4. Veja o console do CMD para erros CUDA\n';
                audioResult.style.display = 'block';
            }

            btnGenerate.disabled = false;
            btnGenerate.textContent = 'Gerar Voz';
        };
    </script>
</body>
</html>
